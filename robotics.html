<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPlay - Robotics & Simulation</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- CodeMirror for Code Editor -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <script>
        // Redirect to index page with login trigger if not authenticated
        if (!localStorage.getItem('pyplay_user')) {
            window.location.href = 'index.html?triggerLogin=true';
        }
    </script>
    <style>
        .simulation-wrapper {
            display: none;
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 540px;
            z-index: 1000;
            background: #1e1e2e;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .simulation-wrapper.show {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        canvas#sim-canvas {
            background: #282a36;
            border: 2px solid #44475a;
            border-radius: 8px;
            max-width: 100%;
            object-fit: contain;
        }
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            flex: 1.2;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-panel header">
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <a href="index.html" class="logo">
                    <img src="image/app_logo.png" alt="Logo" class="logo-icon" style="width: 50px; height: 50px; object-fit: contain; border-radius: 50%;">
                    <h1>PyPlay</h1>
                </a>
                <a href="index.html" class="btn btn-outline" style="padding: 0.35rem 0.75rem; font-size: 0.8rem;">🏠 Home</a>
            </div>
            
            <div class="progress-container" style="width: 380px;">
                <span class="progress-text">Lesson <span id="current-lesson-num">1</span> of <span id="total-lessons">10</span></span>
                <div class="progress-steps-container" id="progress-steps-container"></div>
            </div>
            <div class="controls">
                <button class="btn btn-outline" id="prev-btn" disabled>Previous</button>
                <button class="btn btn-primary" id="next-btn" disabled>Next Lesson</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-workspace">
            <!-- Left Panel: Instructions -->
            <section class="glass-panel instruction-panel">
                <div class="lesson-content">
                    <h2 id="lesson-title" class="lesson-title">Loading...</h2>
                    <div class="badges">
                        <span class="badge badge-difficulty" id="lesson-difficulty">Intermediate</span>
                        <span class="badge badge-topic" id="lesson-topic">Robotics</span>
                    </div>
                    
                    <div class="lesson-section">
                        <h3>📖 Concept</h3>
                        <p id="lesson-concept">Please wait while Pyodide is loading...</p>
                    </div>

                    <div class="lesson-section">
                        <h3>💡 Example</h3>
                        <pre><code id="lesson-example" class="example-code"></code></pre>
                    </div>

                    <div class="lesson-section task-section">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <h3>🎯 Your Task</h3>
                            <button class="btn btn-outline" id="hint-btn" style="padding: 0.2rem 0.6rem; font-size: 0.8rem;">💡 Hint</button>
                        </div>
                        <p id="lesson-task"></p>
                        <div id="lesson-hint" style="display: none; margin-top: 10px; padding: 10px; background: rgba(255, 255, 255, 0.05); border-left: 3px solid #f1fa8c; border-radius: 4px; font-size: 0.85rem; color: #f1fa8c;">
                        </div>
                    </div>
                    
                    <div id="success-message" class="success-message hidden">
                        🎉 Great job! The robot successfully completed its task.
                    </div>
                </div>
            </section>

            <!-- Right Panel: Editor, Simulation & Output -->
            <section class="right-panel">
                
                <!-- Simulation Wrapper (Floating Dock) -->
                <div class="glass-panel simulation-wrapper" id="sim-dock">
                    <div class="panel-header" id="sim-dock-header" style="width: 100%; border-bottom: 1px solid var(--panel-border); margin-bottom: 10px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: move; user-select: none;">
                        <div class="tab">Simulation View</div>
                        <button class="btn btn-clear" id="close-sim-btn" style="padding: 0.2rem 0.5rem; font-size: 1rem; cursor: pointer;">✖</button>
                    </div>
                    <canvas id="sim-canvas" width="500" height="300"></canvas>
                </div>

                <div style="display: flex; flex-direction: column; gap: 1rem; flex: 1; min-height: 0;">
                    <!-- Editor Wrapper -->
                    <div class="glass-panel editor-wrapper" style="flex: 1.5; display: flex; flex-direction: column;">
                        <div class="panel-header" style="display: flex; justify-content: space-between;">
                            <div class="tab active">robot_logic.py</div>
                            <div style="display: flex; gap: 0.5rem;">
                                <button class="btn btn-outline" id="toggle-sim-btn">
                                    👁️ Show Simulation
                                </button>
                                <button class="btn btn-run" id="run-btn" disabled>
                                    <span class="run-icon">▶</span> Run Code
                                </button>
                            </div>
                        </div>
                        <div class="editor-container" style="flex: 1; position: relative;">
                            <textarea id="code-editor"></textarea>
                        </div>
                    </div>

                    <!-- Output Wrapper -->
                    <div class="glass-panel output-wrapper" style="flex: 1; display: flex; flex-direction: column;">
                        <div class="panel-header">
                            <div class="tab">Console Output</div>
                            <button class="btn btn-clear" id="clear-btn">Clear</button>
                        </div>
                        <div class="terminal-container" style="flex: 1; overflow: auto;">
                            <pre id="output-console" class="terminal-output">Initializing Engine...\nThis may take a moment.</pre>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script src="auth.js"></script>
    <script src="robotics_app.js?v=10"></script>
</body>
</html>
